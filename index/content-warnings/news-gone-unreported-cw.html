<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Warning</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fff;
      color: #000;
      font-family: "Times New Roman", Times, serif;
      font-size: 12pt;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .warning-box {
      border: 1px solid #000;
      padding: 2em;
      max-width: 500px;
      width: 100%;
    }

    .warning-box p {
      margin-bottom: 1em;
    }

    .warning-box .cw {
      font-size: 10pt;
      margin-bottom: 1.5em;
    }

    .buttons {
      display: flex;
      gap: 2em;
    }

    .buttons a {
      color: #000;
      text-decoration: none;
      border: 1px solid #000;
      padding: 0.3em 1em;
      font-family: "Times New Roman", Times, serif;
      font-size: 12pt;
    }

    .buttons a:hover {
      background: #000;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="warning-box">
    <p>Are you sure you want to read <em>news gone unreported</em>?</p>
    <p class="cw">Content Warning: Political/Protest, Graphic Violence i.e. Torture of ICE detainees</p>
    <div class="buttons">
      <a href="/media/chapbooks/news-gone-unreported.pdf">yes</a>
      <a href="/index/chapbooks.html">no</a>
    </div>
  </div>
</body>
</html>
