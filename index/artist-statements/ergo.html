<!DOCTYPE html> 
<html lang="en"> 
<head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>&#8756;</title> 
  <style> 

* {
     margin: 0;
     padding: 0;
     box-sizing: border-box;
   }
 
   body {
     background-color: #000;
     color: #FFF;
     font-family: "Times New Roman", Times, serif;
     padding: 3rem;
     max-width: 680px;
   }
 
   .statement-title {
     font-size: 15pt;
     margin-bottom: 1.5em;
   }
 
   .body-text {
     font-size: 12pt;
     line-height: 1.5;
     margin-bottom: 1em;
   }
 
   blockquote {
     font-size: 11pt;
     line-height: 1.5;
     margin: 1em 0 1em 2.5em;
   }
 
   .block-label {
     font-size: 11pt;
     font-weight: bold;
     margin-bottom: 0.3em;
   }
 
   .block-label-plain {
     font-size: 11pt;
     margin-bottom: 0.5em;
   }
 
   .block-body {
     font-size: 11pt;
     line-height: 1.5;
   }

   .list-style-type {
    margin-bottom: 0.5em;
   }

   ul {
   padding-left: 1.8em;
   }
 
   li {
    line-height: 1em;
   }

   ol {
    padding-left: 1.8em;
    line-height: 1.8em;
   }
   
   .end-mark {
     font-size: 12pt;
   }

  </style> 
</head> 
<body> 

<p class="statement-title">&#8756;</p>
<p class="body-text">I was up late.</p>
</body>
</html>
